<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="100%" height="100%">
  <!-- Icon Group -->
  <g transform="translate(15, 30) scale(0.9)">
    <!-- Fork -->
    <path d="M 65 30 L 65 65 C 65 75, 70 80, 80 80 L 80 110 L 90 110 L 90 80 C 100 80, 105 75, 105 65 L 105 30 L 97 30 L 97 65 C 97 68, 95 70, 90 70 L 90 30 L 80 30 L 80 70 C 75 70, 73 68, 73 65 L 73 30 Z" fill="#bced09" stroke="#bced09" stroke-width="2"/>
    
    <!-- Solar Panel -->
    <g transform="translate(145, 60) rotate(-20) scale(1)">
      <rect x="-40" y="-45" width="80" height="50" rx="4" fill="none" stroke="#bced09" stroke-width="7" />
      <line x1="-40" y1="-32" x2="40" y2="-32" stroke="#bced09" stroke-width="5" />
      <line x1="-40" y1="-19" x2="40" y2="-19" stroke="#bced09" stroke-width="5" />
      <line x1="-40" y1="-6" x2="40" y2="-6" stroke="#bced09" stroke-width="5" />
      <line x1="-13" y1="-45" x2="-13" y2="5" stroke="#bced09" stroke-width="5" />
      <line x1="13" y1="-45" x2="13" y2="5" stroke="#bced09" stroke-width="5" />
    </g>

    <!-- Tray Outline -->
    <path d="M 20 90 L 220 90 L 210 120 C 205 135, 190 140, 175 140 L 65 140 C 50 140, 35 135, 30 120 Z" fill="none" stroke="#bced09" stroke-width="10" stroke-linejoin="round"/>
    
    <!-- Top Tray Line Rim -->
    <line x1="10" y1="90" x2="230" y2="90" stroke="#bced09" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Divider -->
    <line x1="120" y1="90" x2="120" y2="140" stroke="#bced09" stroke-width="10"/>
    
    <!-- Seeds -->
    <circle cx="85" cy="165" r="5" fill="#bced09" />
    <circle cx="105" cy="178" r="4.5" fill="#bced09" />
    <circle cx="125" cy="162" r="5" fill="#bced09" />
    <circle cx="145" cy="172" r="4" fill="#bced09" />
    <circle cx="165" cy="182" r="3.5" fill="#bced09" />
    <circle cx="70" cy="155" r="4" fill="#bced09" />
    <circle cx="120" cy="188" r="3.5" fill="#bced09" />
  </g>

  <!-- Text -->
  <text x="215" y="115" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="900" font-size="75" letter-spacing="-1.5"><tspan fill="#FFFFFF">Fight </tspan><tspan fill="#bced09">Hunger </tspan><tspan fill="#FFFFFF">AI</tspan></text>
  <text x="220" y="150" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="500" font-size="16.5" fill="#FFFFFF" letter-spacing="0.5">Sowing Seeds Of Change For A Hunger Free Future</text>

</svg>
